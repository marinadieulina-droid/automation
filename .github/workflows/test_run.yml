name: UI Automation Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run tests with Clear Output
      run: |
        # Запуск тестов. Флаг --tb=line выведет ошибку одной строкой в консоль, если что-то упадет
        xvfb-run --server-args="-screen 0 1920x1080x24" pytest -v --tb=line --alluredir=allure-results

    - name: Install Allure Commandline
      if: always()
      run: |
        # Устанавливаем официальный Allure для сборки отчета
        sudo npm install -g allure-commandline --save-dev

    - name: Generate Allure Report
      if: always()
      run: |
        # Собираем результаты в чистый HTML-сайт в папку allure-report
        allure generate allure-results --clean -o allure-report

    - name: Deploy Allure Report to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      if: always()
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: allure-report # Выкладываем готовый сайт напрямую
        publish_branch: gh-pages