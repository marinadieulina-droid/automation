name: UI Automation Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Позволяет запускать тесты вручную кнопкой в GitHub

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Chrome tests in Headless mode
      run: |
        # Запускаем pytest. Флаг --headless передается в ваш conftest.py (если настроен), 
        # либо убедитесь, что в ваших фикстурах драйвер запускается с аргументом "--headless=new"
        pytest --alluredir=allure-results

    - name: Upload Allure Results
      uses: actions/upload-artifact@v4
      if: always() # Результаты загрузятся, даже если тесты упадут
      with:
        name: allure-results
        path: allure-results
        retention-days: 5