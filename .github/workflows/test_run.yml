name: UI Automation Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Downgrade to Stable Chrome 126 with Core Flags
      run: |
        # Удаляем багнутый Chrome 148
        sudo apt-get remove -y google-chrome-stable chromium-browser || true
        
        # Скачиваем стабильный Chrome 126
        wget -q https://storage.googleapis.com/chrome-for-testing-public/126.0.6478.126/linux64/chrome-linux64.zip
        wget -q https://storage.googleapis.com/chrome-for-testing-public/126.0.6478.126/linux64/chromedriver-linux64.zip
        
        unzip -q chrome-linux64.zip
        unzip -q chromedriver-linux64.zip
        
        # Переносим бинарники
        sudo mv chrome-linux64/chrome /usr/bin/chrome-bin
        sudo chmod +x /usr/bin/chrome-bin
        sudo mv chromedriver-linux64/chromedriver /usr/bin/chromedriver
        sudo chmod +x /usr/bin/chromedriver
        
        # Создаем обертку для /usr/bin/google-chrome, которая принудительно
        # добавит безопасные флаги для Linux-контейнера
        sudo bash -c 'cat > /usr/bin/google-chrome <<EOF
        #!/bin/bash
        exec /usr/bin/chrome-bin --headless=new --no-sandbox --disable-dev-shm-usage --disable-gpu --remote-debugging-port=9222 "\$@"
        EOF'
        sudo chmod +x /usr/bin/google-chrome
        
        rm -rf chrome-linux64* chromedriver-linux64*

    - name: Run tests with Compatible Browser
      run: |
        export PATH=$PATH:/usr/bin
        xvfb-run --server-args="-screen 0 1920x1080x24" pytest -v --tb=short --alluredir=allure-results

    - name: Install Allure Commandline
      if: always()
      run: |
        sudo npm install -g allure-commandline --save-dev

    - name: Generate Allure Report
      if: always()
      run: |
        allure generate allure-results --clean -o allure-report

    - name: Deploy Allure Report to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      if: always()
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: allure-report
        publish_branch: gh-pages