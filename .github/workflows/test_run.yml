name: UI Automation Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Downgrade to Stable Chrome 126
      run: |
        # Полностью вырезаем багнутый Chrome 148 с сервера GitHub
        sudo apt-get remove -y google-chrome-stable chromium-browser || true
        
        # Скачиваем официальную стабильную версию Chrome 126, где нет бага с Runtime.evaluate
        wget -q https://storage.googleapis.com/chrome-for-testing-public/126.0.6478.126/linux64/chrome-linux64.zip
        wget -q https://storage.googleapis.com/chrome-for-testing-public/126.0.6478.126/linux64/chromedriver-linux64.zip
        
        # Распаковываем браузер и драйвер
        unzip -q chrome-linux64.zip
        unzip -q chromedriver-linux64.zip
        
        # Делаем их системными, чтобы ваш Python-код автоматически брал именно их
        sudo mv chrome-linux64/chrome /usr/bin/google-chrome
        sudo chmod +x /usr/bin/google-chrome
        sudo mv chromedriver-linux64/chromedriver /usr/bin/chromedriver
        sudo chmod +x /usr/bin/chromedriver
        
        # Чистим за собой мусор
        rm -rf chrome-linux64* chromedriver-linux64*

    - name: Run tests with Downgraded Browser
      run: |
        # Добавляем в пути, чтобы webdriver-manager или selenium сразу видели наш стабильный драйвер
        export PATH=$PATH:/usr/bin
        xvfb-run --server-args="-screen 0 1920x1080x24" pytest -v --tb=short --alluredir=allure-results

    - name: Install Allure Commandline
      if: always()
      run: |
        sudo npm install -g allure-commandline --save-dev

    - name: Generate Allure Report
      if: always()
      run: |
        allure generate allure-results --clean -o allure-report

    - name: Deploy Allure Report to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      if: always()
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: allure-report
        publish_branch: gh-pages