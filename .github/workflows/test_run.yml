name: UI Automation Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Setup Chrome and ChromeDriver
      run: |
        # Устанавливаем стабильный Chrome и ChromeDriver одной версии,
        # чтобы навсегда убрать ошибку Runtime.evaluate
        sudo apt-get update
        sudo apt-get install -y chromium-browser chromium-chromedriver

    - name: Run tests with Compatible Driver
      env:
        # Указываем Selenium использовать системный chromedriver, который мы только что установили
        SELENIUM_CHROME_EXECUTABLE_PATH: /usr/bin/chromium-browser
      run: |
        # Флаг --tb=short покажет ошибку, даже если Allure будет пустой
        xvfb-run --server-args="-screen 0 1920x1080x24" pytest -v --tb=short --alluredir=allure-results

    - name: Install Allure Commandline
      if: always()
      run: |
        sudo npm install -g allure-commandline --save-dev

    - name: Generate Allure Report
      if: always()
      run: |
        allure generate allure-results --clean -o allure-report

    - name: Deploy Allure Report to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      if: always()
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: allure-report
        publish_branch: gh-pages