name: UI Automation Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  # Правильный триггер запуска по расписанию
  schedule:
    # 01:00 по UTC — это ровно 04:00 утра по Московскому времени (UTC+3)
    - cron: '0 1 * * *'
  # Кнопка ручного запуска (чтобы плашка в интерфейсе вернулась!)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Force Chrome Headless Mode Compatibility
      run: |
        sudo rm -f /usr/bin/google-chrome
        sudo bash -c 'cat > /usr/bin/google-chrome <<EOF
        #!/bin/bash
        exec /usr/bin/google-chrome-stable --headless=new --no-sandbox --disable-dev-shm-usage --disable-gpu --window-size=1920,1080 "\$@"
        EOF'
        sudo chmod +x /usr/bin/google-chrome

    - name: Run tests with Intercepted Browser
      run: |
        xvfb-run --server-args="-screen 0 1920x1080x24" pytest -v --tb=short --alluredir=allure-results

    - name: Install Allure Commandline
      if: always()
      run: |
        sudo npm install -g allure-commandline --save-dev

    - name: Generate Allure Report
      if: always()
      run: |
        allure generate allure-results --clean -o allure-report

    - name: Deploy Allure Report to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      if: always()
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: allure-report
        publish_branch: gh-pages